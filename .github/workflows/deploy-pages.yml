name: Deploy site to GitHub Pages

# Publishes site/ to GitHub Pages every time main moves.
# That's how the Factory Agent's pushes (and the final Ship-It commit) become
# a real shareable URL the team can send to family at the end of the hack.
#
# One-time setup in repo settings:
#   Settings → Pages → Source = "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Only one Pages deploy at a time. Don't cancel an in-flight deploy when a
# new commit lands — the Factory Agent pushes in bursts and we want each
# version to actually go live.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
